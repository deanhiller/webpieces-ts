name: Release

on:
    push:
        branches: [main]
        paths:
            - 'packages/**'
            - 'VERSION'
            - 'nx.json'
            - 'package.json'
            - 'tsconfig.base.json'
            - 'apps/**/tsconfig*.json'
    workflow_dispatch:
        inputs:
            build_number:
                description: 'Build number (leave empty for auto)'
                required: false
                type: string

permissions:
    contents: write
    id-token: write
    pull-requests: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install pnpm
              uses: pnpm/action-setup@v5
              # Version is read automatically from packageManager in package.json

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '24.x'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Ensure Nx cache directory exists
              run: mkdir -p .nx/cache

            - name: Cache Nx
              uses: actions/cache@v5
              with:
                  path: .nx/cache
                  key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.js', '!**/node_modules/**', '!**/dist/**') }}
                  restore-keys: |
                      nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
                      nx-${{ runner.os }}-

            - name: Upgrade npm for trusted publishing
              # Pinned (never @latest) so a stray npm release can't silently break CI.
              # 11.5.1 is the first version supporting npm trusted publishing via OIDC.
              run: npm install -g npm@11.5.1

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Bootstrap tooling packages (required before Nx can process project graph)
              run: |
                # ESLint config imports from @webpieces/eslint-rules which must exist
                # before Nx can create the project graph (due to @nx/eslint/plugin).
                # Build all tooling packages with tsc, then move to expected dist structure.

                # 1. Build eslint-rules
                pnpm exec tsc -p packages/tooling/eslint-rules/tsconfig.lib.json --outDir dist/temp-tsc
                mkdir -p dist/packages/tooling/eslint-rules
                mv dist/temp-tsc/packages/tooling/eslint-rules/* dist/packages/tooling/eslint-rules/
                cp packages/tooling/eslint-rules/package.json dist/packages/tooling/eslint-rules/
                rm -rf dist/temp-tsc

                # 1b. Build rules-config (depended on by ai-hook-rules, code-rules, nx-webpieces-rules)
                pnpm exec tsc -p packages/tooling/rules-config/tsconfig.lib.json --outDir dist/temp-tsc
                mkdir -p dist/packages/tooling/rules-config
                mv dist/temp-tsc/packages/tooling/rules-config/* dist/packages/tooling/rules-config/
                cp packages/tooling/rules-config/package.json dist/packages/tooling/rules-config/
                cp packages/tooling/rules-config/README.md dist/packages/tooling/rules-config/
                rm -rf dist/temp-tsc

                # 2. Build code-rules
                pnpm exec tsc -p packages/tooling/code-rules/tsconfig.lib.json --outDir dist/temp-tsc
                mkdir -p dist/packages/tooling/code-rules
                mv dist/temp-tsc/packages/tooling/code-rules/* dist/packages/tooling/code-rules/
                cp packages/tooling/code-rules/package.json dist/packages/tooling/code-rules/
                cp packages/tooling/code-rules/executors.json dist/packages/tooling/code-rules/
                rm -rf dist/temp-tsc

                # 3. Build ai-hook-rules
                pnpm exec tsc -p packages/tooling/ai-hook-rules/tsconfig.lib.json --outDir dist/temp-tsc
                mkdir -p dist/packages/tooling/ai-hook-rules
                mv dist/temp-tsc/packages/tooling/ai-hook-rules/* dist/packages/tooling/ai-hook-rules/
                cp packages/tooling/ai-hook-rules/package.json dist/packages/tooling/ai-hook-rules/
                cp -r packages/tooling/ai-hook-rules/bin dist/packages/tooling/ai-hook-rules/
                cp -r packages/tooling/ai-hook-rules/templates dist/packages/tooling/ai-hook-rules/
                cp packages/tooling/ai-hook-rules/openclaw.plugin.json dist/packages/tooling/ai-hook-rules/
                rm -rf dist/temp-tsc

                # 4. Build nx-webpieces-rules
                pnpm exec tsc -p packages/tooling/nx-webpieces-rules/tsconfig.lib.json --outDir dist/temp-tsc
                mkdir -p dist/packages/tooling/nx-webpieces-rules
                mv dist/temp-tsc/packages/tooling/nx-webpieces-rules/* dist/packages/tooling/nx-webpieces-rules/
                cp packages/tooling/nx-webpieces-rules/package.json dist/packages/tooling/nx-webpieces-rules/
                cp packages/tooling/nx-webpieces-rules/executors.json dist/packages/tooling/nx-webpieces-rules/
                rm -rf dist/temp-tsc

            - name: Determine version
              id: version
              run: |
                  BASE_VERSION=$(cat VERSION | tr -d '[:space:]')

                  # Use manual build number if provided, otherwise use GitHub run number
                  if [ -n "${{ github.event.inputs.build_number }}" ]; then
                    BUILD_NUMBER="${{ github.event.inputs.build_number }}"
                  else
                    BUILD_NUMBER="${{ github.run_number }}"
                  fi

                  FULL_VERSION="${BASE_VERSION}.${BUILD_NUMBER}"

                  echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
                  echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
                  echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT

                  echo "📦 Version will be: $FULL_VERSION"
                  echo "   Base: $BASE_VERSION (from VERSION file)"
                  echo "   Build: $BUILD_NUMBER"

            - name: Set dynamic version for all packages
              run: |
                  BUILD_NUMBER=${{ steps.version.outputs.build_number }} ./scripts/set-version.sh

            - name: Build all packages
              run: pnpm nx run-many --target=build --all

            - name: Verify dist versions
              run: |
                  echo "Verifying dist package versions:"
                  grep '"version"' dist/packages/core/core-context/package.json
                  grep '"version"' dist/packages/http/http-server/package.json

            - name: Publish packages to npm
              run: |
                  echo "📦 Publishing all packages with version ${{ steps.version.outputs.full_version }}"

                  # Publish in dependency order
                  npm publish dist/packages/core/core-context --access public --provenance
                  npm publish dist/packages/core/core-meta --access public --provenance
                  npm publish dist/packages/core/core-util --access public --provenance
                  npm publish dist/packages/http/http-api --access public --provenance
                  npm publish dist/packages/http/http-filters --access public --provenance
                  npm publish dist/packages/http/http-routing --access public --provenance
                  npm publish dist/packages/http/http-client --access public --provenance
                  npm publish dist/packages/http/http-server --access public --provenance
                  npm publish dist/packages/tooling/rules-config --access public --provenance
                  npm publish dist/packages/tooling/eslint-rules --access public --provenance
                  npm publish dist/packages/tooling/ai-hook-rules --access public --provenance
                  npm publish dist/packages/tooling/code-rules --access public --provenance
                  npm publish dist/packages/tooling/nx-webpieces-rules --access public --provenance

                  # Publish umbrella packages (depend on all above)
                  npm publish dist/packages/server --access public --provenance
                  npm publish dist/packages/client --access public --provenance
              env:
                  NPM_CONFIG_PROVENANCE: true

            - name: Create git tag
              run: |
                  git tag "v${{ steps.version.outputs.full_version }}"
                  git push origin "v${{ steps.version.outputs.full_version }}"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: v${{ steps.version.outputs.full_version }}
                  name: Release ${{ steps.version.outputs.full_version }}
                  body: |
                      🚀 Published version ${{ steps.version.outputs.full_version }} to npm

                      **Base Version:** ${{ steps.version.outputs.base_version }} (from VERSION file)
                      **Build Number:** ${{ steps.version.outputs.build_number }}

                      ## Packages Published:
                      - [@webpieces/core-context@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/core-context/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/core-meta@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/core-meta/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/core-util@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/core-util/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/http-api@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/http-api/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/http-filters@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/http-filters/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/http-routing@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/http-routing/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/http-client@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/http-client/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/http-server@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/http-server/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/rules-config@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/rules-config/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/eslint-rules@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/eslint-rules/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/ai-hook-rules@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/ai-hook-rules/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/code-rules@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/code-rules/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/nx-webpieces-rules@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/nx-webpieces-rules/v/${{ steps.version.outputs.full_version }})

                      ### Umbrella Packages (NEW!)
                      - [@webpieces/server@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/server/v/${{ steps.version.outputs.full_version }}) - All server dependencies
                      - [@webpieces/client@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/client/v/${{ steps.version.outputs.full_version }}) - All client dependencies

                      View all packages: https://www.npmjs.com/search?q=%40webpieces
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
