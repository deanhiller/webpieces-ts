name: Release

on:
    push:
        branches: [main]
        paths:
            - 'packages/**'
            - 'VERSION'
            - 'nx.json'
            - 'package.json'
            - 'tsconfig.base.json'
            - 'apps/**/tsconfig*.json'
    workflow_dispatch:
        inputs:
            build_number:
                description: 'Build number (leave empty for auto)'
                required: false
                type: string

permissions:
    contents: write
    id-token: write
    pull-requests: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install pnpm
              uses: pnpm/action-setup@v5
              # Version is read automatically from packageManager in package.json

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '24.x'
                  registry-url: 'https://registry.npmjs.org'

            - name: Get pnpm store directory
              id: pnpm-store
              run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

            - name: Cache node_modules
              id: cache-node-modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

            - name: Cache pnpm store
              if: steps.cache-node-modules.outputs.cache-hit != 'true'
              uses: actions/cache@v5
              with:
                  path: ${{ steps.pnpm-store.outputs.path }}
                  key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      pnpm-store-${{ runner.os }}-

            - name: Install dependencies
              if: steps.cache-node-modules.outputs.cache-hit != 'true'
              run: pnpm install --frozen-lockfile

            - name: Ensure Nx cache directory exists
              run: mkdir -p .nx/cache

            - name: Cache Nx
              uses: actions/cache@v5
              with:
                  path: .nx/cache
                  key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.js', '!**/node_modules/**', '!**/dist/**') }}
                  restore-keys: |
                      nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
                      nx-${{ runner.os }}-

            - name: Upgrade npm for trusted publishing
              # Pinned (never @latest) so a stray npm release can't silently break CI.
              # 11.5.1 is the first version supporting npm trusted publishing via OIDC.
              run: npm install -g npm@11.5.1

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Bootstrap tooling packages (required before Nx can process project graph)
              run: |
                # ESLint config imports from @webpieces/eslint-plugin which must exist
                # before Nx can create the project graph (due to @nx/eslint/plugin).
                # Build all three tooling packages with tsc, then move to expected dist structure.

                # 1. Build eslint-plugin
                pnpm exec tsc -p packages/tooling/eslint-plugin/tsconfig.lib.json --outDir dist/temp-tsc
                mkdir -p dist/packages/tooling/eslint-plugin
                mv dist/temp-tsc/packages/tooling/eslint-plugin/* dist/packages/tooling/eslint-plugin/
                cp packages/tooling/eslint-plugin/package.json dist/packages/tooling/eslint-plugin/
                rm -rf dist/temp-tsc

                # 2. Build architecture-validators
                pnpm exec tsc -p packages/tooling/architecture-validators/tsconfig.lib.json --outDir dist/temp-tsc
                mkdir -p dist/packages/tooling/architecture-validators
                mv dist/temp-tsc/packages/tooling/architecture-validators/* dist/packages/tooling/architecture-validators/
                cp packages/tooling/architecture-validators/package.json dist/packages/tooling/architecture-validators/
                cp packages/tooling/architecture-validators/executors.json dist/packages/tooling/architecture-validators/
                rm -rf dist/temp-tsc

                # 3. Build ai-hooks
                pnpm exec tsc -p packages/tooling/ai-hooks/tsconfig.lib.json --outDir dist/temp-tsc
                mkdir -p dist/packages/tooling/ai-hooks
                mv dist/temp-tsc/packages/tooling/ai-hooks/* dist/packages/tooling/ai-hooks/
                cp packages/tooling/ai-hooks/package.json dist/packages/tooling/ai-hooks/
                cp -r packages/tooling/ai-hooks/bin dist/packages/tooling/ai-hooks/
                cp -r packages/tooling/ai-hooks/templates dist/packages/tooling/ai-hooks/
                cp packages/tooling/ai-hooks/openclaw.plugin.json dist/packages/tooling/ai-hooks/
                rm -rf dist/temp-tsc

                # 4. Build dev-config
                pnpm exec tsc -p packages/tooling/dev-config/tsconfig.lib.json --outDir dist/temp-tsc
                mkdir -p dist/packages/tooling/dev-config
                mv dist/temp-tsc/packages/tooling/dev-config/* dist/packages/tooling/dev-config/
                cp packages/tooling/dev-config/package.json dist/packages/tooling/dev-config/
                cp packages/tooling/dev-config/executors.json dist/packages/tooling/dev-config/
                rm -rf dist/temp-tsc

            - name: Determine version
              id: version
              run: |
                  BASE_VERSION=$(cat VERSION | tr -d '[:space:]')

                  # Use manual build number if provided, otherwise use GitHub run number
                  if [ -n "${{ github.event.inputs.build_number }}" ]; then
                    BUILD_NUMBER="${{ github.event.inputs.build_number }}"
                  else
                    BUILD_NUMBER="${{ github.run_number }}"
                  fi

                  FULL_VERSION="${BASE_VERSION}.${BUILD_NUMBER}"

                  echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
                  echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
                  echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT

                  echo "📦 Version will be: $FULL_VERSION"
                  echo "   Base: $BASE_VERSION (from VERSION file)"
                  echo "   Build: $BUILD_NUMBER"

            - name: Set dynamic version for all packages
              run: |
                  BUILD_NUMBER=${{ steps.version.outputs.build_number }} ./scripts/set-version.sh

            - name: Build all packages
              run: pnpm nx run-many --target=build --all

            - name: Verify dist versions
              run: |
                  echo "Verifying dist package versions:"
                  grep '"version"' dist/packages/core/core-context/package.json
                  grep '"version"' dist/packages/http/http-server/package.json

            - name: Publish packages to npm
              run: |
                  echo "📦 Publishing all packages with version ${{ steps.version.outputs.full_version }}"

                  # Publish in dependency order
                  npm publish dist/packages/core/core-context --access public --provenance
                  npm publish dist/packages/core/core-meta --access public --provenance
                  npm publish dist/packages/core/core-util --access public --provenance
                  npm publish dist/packages/http/http-api --access public --provenance
                  npm publish dist/packages/http/http-filters --access public --provenance
                  npm publish dist/packages/http/http-routing --access public --provenance
                  npm publish dist/packages/http/http-client --access public --provenance
                  npm publish dist/packages/http/http-server --access public --provenance
                  npm publish dist/packages/tooling/eslint-plugin --access public --provenance
                  npm publish dist/packages/tooling/ai-hooks --access public --provenance
                  npm publish dist/packages/tooling/architecture-validators --access public --provenance
                  npm publish dist/packages/tooling/dev-config --access public --provenance

                  # Publish umbrella packages (depend on all above)
                  npm publish dist/packages/server --access public --provenance
                  npm publish dist/packages/client --access public --provenance
              env:
                  NPM_CONFIG_PROVENANCE: true

            - name: Create git tag
              run: |
                  git tag "v${{ steps.version.outputs.full_version }}"
                  git push origin "v${{ steps.version.outputs.full_version }}"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: v${{ steps.version.outputs.full_version }}
                  name: Release ${{ steps.version.outputs.full_version }}
                  body: |
                      🚀 Published version ${{ steps.version.outputs.full_version }} to npm

                      **Base Version:** ${{ steps.version.outputs.base_version }} (from VERSION file)
                      **Build Number:** ${{ steps.version.outputs.build_number }}

                      ## Packages Published:
                      - [@webpieces/core-context@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/core-context/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/core-meta@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/core-meta/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/core-util@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/core-util/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/http-api@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/http-api/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/http-filters@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/http-filters/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/http-routing@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/http-routing/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/http-client@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/http-client/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/http-server@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/http-server/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/ai-hooks@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/ai-hooks/v/${{ steps.version.outputs.full_version }})
                      - [@webpieces/dev-config@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/dev-config/v/${{ steps.version.outputs.full_version }})

                      ### Umbrella Packages (NEW!)
                      - [@webpieces/server@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/server/v/${{ steps.version.outputs.full_version }}) - All server dependencies
                      - [@webpieces/client@${{ steps.version.outputs.full_version }}](https://www.npmjs.com/package/@webpieces/client/v/${{ steps.version.outputs.full_version }}) - All client dependencies

                      View all packages: https://www.npmjs.com/search?q=%40webpieces
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
