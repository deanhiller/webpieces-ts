<div class="container">
  <h1>{{ title }}</h1>

  <div class="info">
    <p><strong>API Base URL:</strong> {{ apiBaseUrl }}</p>
    <p><strong>Client URL:</strong> {{ envConfig.webBaseUrl() }}</p>
  </div>

  <div class="actions">
    <button (click)="callSaveApi()" [disabled]="loading">
      Call SaveApi
    </button>

    <button (click)="callPublicApi()" [disabled]="loading">
      Call PublicApi
    </button>
  </div>

  @if (loading) {
    <div class="status">
      <p>Loading...</p>
    </div>
  }

  @if (error) {
    <div class="error">
      <h3>Error:</h3>
      <pre>{{ error }}</pre>
    </div>
  }

  @if (saveResponse) {
    <div class="response">
      <h3>SaveApi Response:</h3>
      <pre>{{ saveResponse | json }}</pre>
    </div>
  }

  @if (publicResponse) {
    <div class="response">
      <h3>PublicApi Response:</h3>
      <pre>{{ publicResponse | json }}</pre>
    </div>
  }

  <router-outlet></router-outlet>
</div>
